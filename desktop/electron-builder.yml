appId: com.portable-pug.desktop
productName: Portable Pug
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist/**/*
  - resources/web/**/*

extraResources:
  - from: resources/sidecar
    to: sidecar
    filter:
      - "**/*"

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: build/icon.icns

win:
  target:
    - nsis
  icon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
