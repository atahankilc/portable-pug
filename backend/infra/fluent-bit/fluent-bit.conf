[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name   forward
    Listen 0.0.0.0
    Port   24224

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       json
    Reserve_Data On

[OUTPUT]
    Name  stdout
    Match *

[OUTPUT]
    Name               es
    Match              *
    Host               elasticsearch
    Port               9200
    Logstash_Format    On
    Logstash_Prefix    logs
    Retry_Limit        False
    Suppress_Type_Name On
